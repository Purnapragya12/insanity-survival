<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INSANITY SURVIVAL</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="score">0</div>

<div id="menu">

<h1>INSANITY SURVIVAL</h1>

<button onclick="startGame()">START</button>

<div id="instructions">

<p><b>Move:</b> Arrow Keys / Touch</p>

<p><b>Avoid:</b> Red enemies</p>

<p><b>Goal:</b> Survive as long as possible</p>

<p class="challenge">Most players fail before 30s</p>

</div>

</div>

<div id="gameOver">

<h2>GAME OVER</h2>

<p id="finalScore"></p>

<button onclick="restart()">TRY AGAIN</button>

</div>

<canvas id="game"></canvas>

<script src="game.js"></script>

</body>

</html>
