<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>INSANITY SURVIVAL</title>

</head>

<body>

<div id="score">0</div>

<div id="menu">

<h1>INSANITY SURVIVAL</h1>

<button onclick="startGame()">START</button>

<p id="finalScore"></p>

<canvas id="game"></canvas>

<script src="game.js"></script>

</body>

</html>
